<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Học toán cộng trừ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe4ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ok: #15803d;
      --bad: #b91c1c;
      --soft: #eef4ff;
      --shadow: 0 14px 40px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 24px;
      box-shadow: var(--shadow);
      z-index: 1;
    }

    .brand {
      margin: 0 0 22px;
      font-size: 28px;
      line-height: 1.15;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label,
    .field legend {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    select,
    input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .choice {
      display: block;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      background: #fff;
      cursor: pointer;
      line-height: 40px;
      font-weight: 700;
      text-align: center;
      user-select: none;
    }

    .choice input {
      display: none;
    }

    .choice:has(input:checked) {
      border-color: var(--primary);
      background: var(--soft);
      color: var(--primary-dark);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    .secondary:hover {
      background: #cbd5e1;
    }

    .score {
      min-height: 52px;
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    main {
      padding: 28px;
      overflow: auto;
    }

    .topbar {
      margin-bottom: 22px;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
    }

    .problems {
      display: grid;
      gap: 14px;
    }

    .problems.vertical {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      align-items: start;
    }

    .problems.horizontal {
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      align-items: start;
    }

    .problem {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px 28px;
      align-items: center;
      gap: 14px;
      min-height: 90px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .problem.correct {
      border-color: rgba(21, 128, 61, 0.45);
      background: #f0fdf4;
    }

    .problem.wrong {
      border-color: rgba(185, 28, 28, 0.45);
      background: #fef2f2;
    }

    .expression {
      min-width: 0;
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .horizontal .expression {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    .vertical .problem {
      display: grid;
      grid-template-columns: 1fr 28px;
      gap: 10px;
      min-height: 170px;
      justify-items: center;
    }

    .vertical .expression {
      grid-column: 1;
      justify-self: end;
      display: grid;
      grid-template-columns: 34px minmax(72px, max-content);
      gap: 0 10px;
      min-width: 130px;
      text-align: right;
      line-height: 1.15;
    }

    .vertical .first {
      grid-column: 2;
    }

    .vertical .op {
      grid-column: 1;
      grid-row: 2;
    }

    .vertical .second {
      grid-column: 2;
      grid-row: 2;
      border-bottom: 3px solid var(--text);
      padding-bottom: 4px;
    }

    .vertical .answer {
      grid-column: 1;
      justify-self: end;
      margin-top: 8px;
      text-align: right;
    }

    .vertical .result {
      grid-column: 2;
      grid-row: 1 / 3;
      align-self: center;
    }

    input.answer {
      appearance: none;
      -moz-appearance: textfield;
      width: 112px;
      height: 50px;
      padding: 0 10px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      line-height: 50px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .result {
      width: 28px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
    }

    .correct .result {
      color: var(--ok);
    }

    .wrong .result {
      color: var(--bad);
    }

    .empty-state {
      min-height: 300px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8c4d4;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 20px;
      }
    }

    @media (max-width: 520px) {
      .problems.horizontal,
      .problems.vertical {
        grid-template-columns: 1fr;
      }

      .problem {
        align-items: stretch;
      }

      .horizontal .problem {
        grid-template-columns: minmax(0, 1fr) 92px 26px;
        gap: 10px;
      }

      .horizontal .expression {
        font-size: 24px;
      }

      .horizontal input.answer {
        width: 92px;
        height: 46px;
        font-size: 24px;
        line-height: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="brand">Học toán cộng trừ</h1>

      <div class="field">
        <label for="digits">Phạm vi số</label>
        <select id="digits">
          <option value="2" selected>2 chữ số</option>
          <option value="3">3 chữ số</option>
        </select>
      </div>

      <div class="field">
        <label for="operation">Dạng phép toán</label>
        <select id="operation">
          <option value="mixed">Cộng và trừ</option>
          <option value="add">Chỉ phép cộng</option>
          <option value="subtract">Chỉ phép trừ</option>
        </select>
      </div>

      <div class="field">
        <label for="count">Số câu</label>
        <input id="count" type="number" min="1" max="60" value="12">
      </div>

      <fieldset class="field">
        <legend>Cách hiển thị</legend>
        <div class="segmented">
          <label class="choice">
            <input type="radio" name="layout" value="vertical" checked>
            Hàng dọc
          </label>
          <label class="choice">
            <input type="radio" name="layout" value="horizontal">
            Hàng ngang
          </label>
        </div>
      </fieldset>

      <div class="actions">
        <button class="primary" id="generateBtn" type="button">Tạo đề</button>
        <button class="secondary" id="gradeBtn" type="button">Chấm điểm</button>
      </div>

      <div class="score" id="scoreBox">Chưa có đề bài.</div>
    </aside>

    <main>
      <div class="topbar">
        <h2>Danh sách phép toán</h2>
        <p class="hint">Nhập đáp án vào ô trống rồi bấm chấm điểm.</p>
      </div>

      <section id="problems" class="problems vertical" aria-live="polite">
        <div class="empty-state">Bấm “Tạo đề” để bắt đầu luyện tập.</div>
      </section>
    </main>
  </div>

  <script>
    const digitsEl = document.getElementById('digits');
    const operationEl = document.getElementById('operation');
    const countEl = document.getElementById('count');
    const generateBtn = document.getElementById('generateBtn');
    const gradeBtn = document.getElementById('gradeBtn');
    const problemsEl = document.getElementById('problems');
    const scoreBox = document.getElementById('scoreBox');

    let problems = [];
    let currentLayout = 'vertical';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRange(digits) {
      return digits === 3 ? { min: 100, max: 999 } : { min: 10, max: 99 };
    }

    function getSelectedLayout() {
      return document.querySelector('input[name="layout"]:checked').value;
    }

    function createProblem(digits, operationMode) {
      const range = getRange(digits);
      let operator = operationMode;

      if (operator === 'mixed') {
        operator = Math.random() > 0.5 ? 'add' : 'subtract';
      }

      if (operator === 'add') {
        const first = randomInt(range.min, range.max - range.min);
        const second = randomInt(range.min, range.max - first);
        return {
          first,
          second,
          operator: '+',
          answer: first + second
        };
      }

      const first = randomInt(range.min * 2, range.max);
      const second = randomInt(range.min, first - range.min);

      return {
        first,
        second,
        operator: '-',
        answer: first - second
      };
    }

    function expressionTemplate(problem, layout) {
      if (layout === 'vertical') {
        return `
          <div class="expression" aria-label="${problem.first} ${problem.operator} ${problem.second}">
            <span class="first">${problem.first}</span>
            <span class="op">${problem.operator}</span>
            <span class="second">${problem.second}</span>
          </div>
        `;
      }

      return `
        <div class="expression" aria-label="${problem.first} ${problem.operator} ${problem.second}">
          <span>${problem.first}</span>
          <span>${problem.operator}</span>
          <span>${problem.second}</span>
          <span>=</span>
        </div>
      `;
    }

    function renderProblems() {
      problemsEl.className = `problems ${currentLayout}`;

      if (problems.length === 0) {
        problemsEl.innerHTML = '<div class="empty-state">Bấm “Tạo đề” để bắt đầu luyện tập.</div>';
        return;
      }

      problemsEl.innerHTML = problems.map((problem, index) => `
        <article class="problem" data-index="${index}">
          ${expressionTemplate(problem, currentLayout)}
          <input class="answer" type="number" inputmode="numeric" aria-label="Đáp án câu ${index + 1}">
          <span class="result" aria-hidden="true"></span>
        </article>
      `).join('');
    }

    function generateProblems() {
      const digits = Number(digitsEl.value);
      const operationMode = operationEl.value;
      const count = Math.min(60, Math.max(1, Number(countEl.value) || 1));
      countEl.value = count;
      currentLayout = getSelectedLayout();

      problems = Array.from({ length: count }, () => createProblem(digits, operationMode));
      scoreBox.textContent = `Đã tạo ${count} câu.`;
      renderProblems();

      const firstAnswer = problemsEl.querySelector('.answer');
      if (firstAnswer) {
        firstAnswer.focus();
      }
    }

    function gradeProblems() {
      if (problems.length === 0) {
        scoreBox.textContent = 'Hãy bấm Tạo đề trước khi chấm điểm.';
        return;
      }

      let correct = 0;
      const cards = problemsEl.querySelectorAll('.problem');

      cards.forEach((card) => {
        const index = Number(card.dataset.index);
        const input = card.querySelector('.answer');
        const result = card.querySelector('.result');
        const value = Number(input.value);
        const hasAnswer = input.value.trim() !== '';
        const isCorrect = hasAnswer && value === problems[index].answer;

        card.classList.toggle('correct', isCorrect);
        card.classList.toggle('wrong', !isCorrect);
        result.textContent = isCorrect ? '✓' : '✕';

        if (isCorrect) {
          correct += 1;
        }
      });

      scoreBox.textContent = `Kết quả: ${correct}/${problems.length} câu đúng.`;
    }

    generateBtn.addEventListener('click', generateProblems);
    gradeBtn.addEventListener('click', gradeProblems);
  </script>
</body>
</html>
