<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cộng qua 10</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe4ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ok: #15803d;
      --bad: #b91c1c;
      --soft: #eef4ff;
      --shadow: 0 14px 40px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 24px;
      box-shadow: var(--shadow);
      z-index: 1;
    }

    .brand {
      margin: 0 0 22px;
      font-size: 28px;
      line-height: 1.15;
    }

    .nav-link {
      display: block;
      margin-bottom: 22px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-link:hover {
      color: var(--primary-dark);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label,
    .field legend {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    fieldset {
      border: 0;
      padding: 0;
      margin: 0;
    }

    input[type="number"] {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="number"] {
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .choice {
      display: block;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 8px;
      background: #fff;
      cursor: pointer;
      line-height: 40px;
      font-weight: 700;
      text-align: center;
      user-select: none;
    }

    .choice input {
      display: none;
    }

    .choice:has(input:checked) {
      border-color: var(--primary);
      background: var(--soft);
      color: var(--primary-dark);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    .secondary:hover {
      background: #cbd5e1;
    }

    .score {
      min-height: 52px;
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.35;
    }

    main {
      padding: 28px;
      overflow: auto;
    }

    .topbar {
      margin-bottom: 22px;
    }

    h2 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
    }

    .problems {
      display: grid;
      gap: 14px;
    }

    .problems.horizontal {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      align-items: start;
    }

    .problem {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px 28px;
      align-items: center;
      gap: 14px;
      min-height: 90px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .problem.correct {
      border-color: rgba(21, 128, 61, 0.45);
      background: #f0fdf4;
    }

    .problem.wrong {
      border-color: rgba(185, 28, 28, 0.45);
      background: #fef2f2;
    }

    .expression {
      min-width: 0;
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    input.answer {
      appearance: none;
      -moz-appearance: textfield;
      width: 112px;
      height: 50px;
      padding: 0 10px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 28px;
      line-height: 50px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .mcq-options {
      display: flex;
      gap: 8px;
    }

    .mcq-btn {
      width: 56px;
      height: 50px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      line-height: 46px;
      padding: 0;
    }

    .mcq-btn.selected {
      border-color: var(--primary);
      background: var(--soft);
    }

    .mcq-btn.correct {
      border-color: var(--ok);
      background: #f0fdf4;
    }

    .mcq-btn.wrong {
      border-color: var(--bad);
      background: #fef2f2;
    }

    .result {
      width: 28px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
    }

    .correct .result {
      color: var(--ok);
    }

    .wrong .result {
      color: var(--bad);
    }

    .empty-state {
      min-height: 300px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8c4d4;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        padding: 20px;
      }
    }

    @media (max-width: 520px) {
      .problems.horizontal {
        grid-template-columns: 1fr;
      }

      .problem {
        grid-template-columns: minmax(0, 1fr) 92px 26px;
        gap: 10px;
      }

      .expression {
        font-size: 24px;
      }

      input.answer {
        width: 92px;
        height: 46px;
        font-size: 24px;
        line-height: 46px;
      }

      .mcq-btn {
        width: 48px;
        height: 44px;
        font-size: 20px;
        line-height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="nav-link" href="index.html">&larr; Về trang chủ</a>
      <h1 class="brand">Cộng qua 10</h1>

      <div class="field">
        <label for="count">Số câu</label>
        <input id="count" type="number" min="1" max="60" value="12">
      </div>

      <fieldset class="field">
        <legend>Kiểu đề</legend>
        <div class="segmented">
          <label class="choice">
            <input type="radio" name="mode" value="input" checked>
            Tự nhập
          </label>
          <label class="choice">
            <input type="radio" name="mode" value="mcq">
            Trắc nghiệm
          </label>
        </div>
      </fieldset>

      <div class="actions">
        <button class="primary" id="generateBtn" type="button">Tạo đề</button>
        <button class="secondary" id="gradeBtn" type="button">Chấm điểm</button>
      </div>

      <div class="score" id="scoreBox">Chưa có đề bài.</div>
    </aside>

    <main>
      <div class="topbar">
        <h2>Phép cộng 1 + 1 chữ số (kết quả &ge; 10)</h2>
        <p class="hint" id="hintText">Nhập đáp án vào ô trống rồi bấm chấm điểm.</p>
      </div>

      <section id="problems" class="problems horizontal" aria-live="polite">
        <div class="empty-state">Bấm "Tạo đề" để bắt đầu luyện tập.</div>
      </section>
    </main>
  </div>

  <script>
    const countEl = document.getElementById('count');
    const generateBtn = document.getElementById('generateBtn');
    const gradeBtn = document.getElementById('gradeBtn');
    const problemsEl = document.getElementById('problems');
    const scoreBox = document.getElementById('scoreBox');
    const hintText = document.getElementById('hintText');

    let problems = [];

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createProblem(prev) {
      let a, b;
      let attempts = 0;
      do {
        a = randomInt(1, 9);
        b = randomInt(Math.max(1, 10 - a), 9);
        attempts++;
      } while (prev && a === prev.first && b === prev.second && attempts < 50);
      return { first: a, second: b, operator: '+', answer: a + b };
    }

    function generateDistractors(correctAnswer) {
      const distractors = new Set();
      while (distractors.size < 2) {
        const d = randomInt(10, 18);
        if (d !== correctAnswer) {
          distractors.add(d);
        }
      }
      return [...distractors];
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randomInt(0, i);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getSelectedMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function renderProblems() {
      const mode = getSelectedMode();

      if (problems.length === 0) {
        problemsEl.innerHTML = '<div class="empty-state">Bấm "Tạo đề" để bắt đầu luyện tập.</div>';
        return;
      }

      if (mode === 'input') {
        hintText.textContent = 'Nhập đáp án vào ô trống rồi bấm chấm điểm.';
        problemsEl.innerHTML = problems.map((problem, index) => `
          <article class="problem" data-index="${index}">
            <div class="expression">
              <span>${problem.first}</span>
              <span>${problem.operator}</span>
              <span>${problem.second}</span>
              <span>=</span>
            </div>
            <input class="answer" type="number" inputmode="numeric" aria-label="Đáp án câu ${index + 1}">
            <span class="result" aria-hidden="true"></span>
          </article>
        `).join('');
      } else {
        hintText.textContent = 'Chọn đáp án đúng cho mỗi câu rồi bấm chấm điểm.';
        problemsEl.innerHTML = problems.map((problem, index) => {
          const distractors = generateDistractors(problem.answer);
          const options = shuffle([problem.answer, ...distractors]);
          return `
            <article class="problem" data-index="${index}">
              <div class="expression">
                <span>${problem.first}</span>
                <span>${problem.operator}</span>
                <span>${problem.second}</span>
                <span>=</span>
              </div>
              <div class="mcq-options" role="radiogroup" aria-label="Đáp án câu ${index + 1}">
                ${options.map((val, oi) => `
                  <button class="mcq-btn" type="button" data-value="${val}" role="radio" aria-checked="false">${val}</button>
                `).join('')}
              </div>
              <span class="result" aria-hidden="true"></span>
            </article>
          `;
        }).join('');

        problemsEl.querySelectorAll('.mcq-options').forEach((group) => {
          const btns = group.querySelectorAll('.mcq-btn');
          btns.forEach((btn) => {
            btn.addEventListener('click', () => {
              btns.forEach((b) => {
                b.classList.remove('selected');
                b.setAttribute('aria-checked', 'false');
              });
              btn.classList.add('selected');
              btn.setAttribute('aria-checked', 'true');
            });
          });
        });
      }
    }

    function generateProblems() {
      const count = Math.min(60, Math.max(1, Number(countEl.value) || 1));
      countEl.value = count;

      problems = [];
      for (let i = 0; i < count; i++) {
        problems.push(createProblem(problems.length > 0 ? problems[problems.length - 1] : null));
      }

      scoreBox.textContent = `Đã tạo ${count} câu.`;
      renderProblems();

      const firstInput = problemsEl.querySelector('.answer, .mcq-btn');
      if (firstInput) {
        firstInput.focus();
      }
    }

    function gradeProblems() {
      const mode = getSelectedMode();

      if (problems.length === 0) {
        scoreBox.textContent = 'Hãy bấm Tạo đề trước khi chấm điểm.';
        return;
      }

      let correct = 0;
      const cards = problemsEl.querySelectorAll('.problem');

      cards.forEach((card) => {
        const index = Number(card.dataset.index);
        const result = card.querySelector('.result');
        let isCorrect = false;

        if (mode === 'input') {
          const input = card.querySelector('.answer');
          const value = Number(input.value);
          const hasAnswer = input.value.trim() !== '';
          isCorrect = hasAnswer && value === problems[index].answer;
        } else {
          const selected = card.querySelector('.mcq-btn.selected');
          if (selected) {
            isCorrect = Number(selected.dataset.value) === problems[index].answer;
            selected.classList.toggle('correct', isCorrect);
            selected.classList.toggle('wrong', !isCorrect);
          }
        }

        card.classList.toggle('correct', isCorrect);
        card.classList.toggle('wrong', !isCorrect);
        result.textContent = isCorrect ? '✓' : '✕';

        if (isCorrect) {
          correct += 1;
        }
      });

      scoreBox.textContent = `Kết quả: ${correct}/${problems.length} câu đúng.`;
    }

    generateBtn.addEventListener('click', generateProblems);
    gradeBtn.addEventListener('click', gradeProblems);
  </script>
</body>
</html>
