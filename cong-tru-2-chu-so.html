<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cộng trừ 2 chữ số - Bé học toán</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');

    :root {
      --pink: #ff6b9d;
      --orange: #ff9a56;
      --yellow: #ffd93d;
      --green: #6bcb77;
      --blue: #4d96ff;
      --purple: #9b59b6;
      --bg-start: #e8f5e9;
      --bg-end: #e3f2fd;
      --card-bg: #ffffff;
      --shadow: 0 8px 30px rgba(0,0,0,0.1);
      --correct: #27ae60;
      --wrong: #e74c3c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: #2d3436;
    }

    .app {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #f0fdf4, #fff);
      border-right: 3px solid #c8e6c9;
      padding: 24px 20px;
      box-shadow: 4px 0 20px rgba(0,0,0,0.05);
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--blue);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .nav-link:hover { color: #2e6bd4; }

    .brand {
      margin: 0 0 4px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 26px;
      color: var(--purple);
      text-shadow: 2px 2px 0 #e8d5f0;
    }
    .brand small { display: block; font-size: 13px; color: #999; font-weight: 600; margin-top: 2px; }

    .field { margin-bottom: 16px; }
    .field label, .field legend {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 800;
      color: #666;
    }

    fieldset { border: 0; padding: 0; margin: 0; }

    select, input[type="number"] {
      width: 100%;
      height: 46px;
      border: 3px solid #e8e0e2;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 700;
      background: #fcfafb;
      color: #2d3436;
      outline: none;
      font-family: 'Nunito', Arial, sans-serif;
      transition: border-color 0.2s;
    }
    select:focus, input[type="number"]:focus { border-color: var(--purple); }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { margin: 0; appearance: none; }
    input[type="number"] { appearance: textfield; }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .choice {
      display: block;
      height: 44px;
      border: 3px solid #e8e0e2;
      border-radius: 12px;
      background: #fcfafb;
      cursor: pointer;
      line-height: 38px;
      font-weight: 800;
      font-size: 14px;
      text-align: center;
      user-select: none;
      transition: all 0.15s;
    }
    .choice input { display: none; }
    .choice:has(input:checked) {
      border-color: var(--purple);
      background: #f3e5f5;
      color: var(--purple);
    }

    .actions { display: grid; gap: 8px; margin-top: 20px; }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Nunito', Arial, sans-serif;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    button:active { transform: scale(0.96); }

    .btn-purple {
      background: linear-gradient(135deg, var(--purple), #7d3c98);
      color: #fff;
      box-shadow: 0 4px 15px rgba(155,89,182,0.4);
    }
    .btn-purple:hover { box-shadow: 0 6px 20px rgba(155,89,182,0.5); }

    .btn-green {
      background: linear-gradient(135deg, var(--green), #27ae60);
      color: #fff;
      box-shadow: 0 4px 15px rgba(107,203,119,0.4);
    }
    .btn-green:hover { box-shadow: 0 6px 20px rgba(107,203,119,0.5); }

    .btn-orange {
      background: linear-gradient(135deg, var(--orange), #e67e22);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255,154,86,0.4);
    }
    .btn-orange:hover { box-shadow: 0 6px 20px rgba(255,154,86,0.5); }

    .score {
      min-height: 48px;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fcfafb;
      border: 2px dashed #e8e0e2;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.4;
      color: #888;
    }

    main { padding: 28px; overflow: auto; }
    .topbar { margin-bottom: 20px; }

    h2 {
      margin: 0 0 4px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 28px;
      color: var(--purple);
      text-shadow: 2px 2px 0 #e8d5f0;
    }

    .hint { margin: 0; color: #999; font-weight: 600; font-size: 15px; }

    .problems { display: grid; gap: 12px; }
    .problems.horizontal { grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); }
    .problems.vertical { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); align-items: start; }

    .problem {
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      border: 3px solid transparent;
      transition: border-color 0.25s, background 0.25s;
    }

    .problem.correct {
      border-color: var(--correct);
      background: #eafaf1;
    }
    .problem.wrong {
      border-color: var(--wrong);
      background: #fdedec;
    }

    /* Horizontal layout */
    .problems.horizontal .problem {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 32px;
      align-items: center;
      gap: 12px;
      min-height: 82px;
    }

    .problems.horizontal .expression {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fredoka One', sans-serif;
      font-size: 28px;
      color: #2d3436;
      min-width: 0;
      overflow: hidden;
    }

    /* Vertical layout */
    .problems.vertical .problem {
      display: grid;
      grid-template-columns: 1fr 32px;
      gap: 6px 10px;
      min-height: 160px;
      justify-items: center;
      padding: 14px 12px;
    }

    .problems.vertical .expression {
      grid-column: 1;
      justify-self: end;
      display: grid;
      grid-template-columns: 28px minmax(60px, max-content);
      gap: 0 8px;
      min-width: 110px;
      text-align: right;
      line-height: 1.15;
      font-family: 'Fredoka One', sans-serif;
      font-size: 24px;
      color: #2d3436;
    }

    .problems.vertical .first { grid-column: 2; }
    .problems.vertical .op { grid-column: 1; grid-row: 2; }
    .problems.vertical .second {
      grid-column: 2;
      grid-row: 2;
      border-bottom: 3px solid #2d3436;
      padding-bottom: 4px;
    }
    .problems.vertical .answer {
      grid-column: 1;
      justify-self: end;
      margin-top: 6px;
      text-align: right;
    }
    .problems.vertical .result {
      grid-column: 2;
      grid-row: 1 / 3;
      align-self: center;
    }

    input.answer {
      appearance: none;
      width: 100px;
      height: 50px;
      padding: 0 4px;
      text-align: center;
      font-family: 'Fredoka One', sans-serif;
      font-size: 26px;
      font-weight: 800;
      border: 3px solid #e8e0e2;
      border-radius: 14px;
      background: #fcfafb;
      color: #2d3436;
      outline: none;
      transition: border-color 0.2s;
    }
    input.answer:focus { border-color: var(--purple); }

    .result {
      width: 32px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
    }
    .correct .result { color: var(--correct); }
    .wrong .result { color: var(--wrong); }

    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      border: 3px dashed #e0d6d9;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      color: #bbb;
      text-align: center;
      padding: 24px;
      font-size: 18px;
      font-weight: 700;
    }

    .emoji-big { font-size: 60px; display: block; margin-bottom: 8px; }
    .stars { display: flex; gap: 2px; justify-content: center; margin-top: 4px; }
    .stars .star { font-size: 20px; transition: all 0.3s; opacity: 0.2; }
    .stars .star.lit { opacity: 1; }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 3px solid #c8e6c9; }
      main { padding: 20px; }
    }

    @media (max-width: 520px) {
      .problems.horizontal, .problems.vertical { grid-template-columns: 1fr; }
      .problems.horizontal .problem { grid-template-columns: minmax(0, 1fr) 80px 28px; gap: 8px; padding: 12px 14px; }
      .problems.horizontal .expression { font-size: 22px; }
      .problems.vertical .expression { font-size: 20px; }
      input.answer { width: 80px; height: 44px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="nav-link" href="index.html">&larr; Về trang chủ</a>
      <h1 class="brand">Cộng trừ 2 chữ số <small>Luyện tập toán vui</small></h1>

      <div class="field">
        <label for="digits">🔢 Phạm vi số</label>
        <select id="digits">
          <option value="2">2 chữ số (10–99)</option>
          <option value="3">3 chữ số (100–999)</option>
        </select>
      </div>

      <div class="field">
        <label for="operation">🧮 Dạng phép toán</label>
        <select id="operation">
          <option value="mixed">➕➖ Cộng và trừ</option>
          <option value="add">➕ Chỉ phép cộng</option>
          <option value="subtract">➖ Chỉ phép trừ</option>
        </select>
      </div>

      <div class="field">
        <label for="count">📝 Số câu</label>
        <input id="count" type="number" min="1" max="60" value="12">
      </div>

      <fieldset class="field">
        <legend>📐 Cách hiển thị</legend>
        <div class="segmented">
          <label class="choice">
            <input type="radio" name="layout" value="vertical" checked>
            〰️ Hàng dọc
          </label>
          <label class="choice">
            <input type="radio" name="layout" value="horizontal">
            ↔️ Hàng ngang
          </label>
        </div>
      </fieldset>

      <div class="actions">
        <button class="btn-purple" id="generateBtn" type="button">✨ Tạo đề mới</button>
        <button class="btn-green" id="gradeBtn" type="button">✅ Chấm điểm</button>
      </div>

      <div class="score" id="scoreBox">🌟 Chưa có đề bài.</div>
    </aside>

    <main>
      <div class="topbar">
        <h2>🧮 Phép cộng trừ 2 chữ số</h2>
        <p class="hint">Nhập đáp án vào ô trống rồi bấm ✅ Chấm điểm nhé!</p>
      </div>

      <section id="problems" class="problems vertical" aria-live="polite">
        <div class="empty-state">
          <span class="emoji-big">📚</span>
          Bấm ✨ Tạo đề mới để bắt đầu luyện tập!
        </div>
      </section>
    </main>
  </div>

  <script>
    const digitsEl = document.getElementById('digits');
    const operationEl = document.getElementById('operation');
    const countEl = document.getElementById('count');
    const generateBtn = document.getElementById('generateBtn');
    const gradeBtn = document.getElementById('gradeBtn');
    const problemsEl = document.getElementById('problems');
    const scoreBox = document.getElementById('scoreBox');

    let problems = [];
    let currentLayout = 'vertical';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getRange(digits) {
      return digits === '3' ? { min: 100, max: 999 } : { min: 10, max: 99 };
    }

    function getSelectedLayout() {
      return document.querySelector('input[name="layout"]:checked').value;
    }

    function createProblem(digits, operationMode) {
      const range = getRange(digits);
      let operator = operationMode;
      if (operator === 'mixed') operator = Math.random() > 0.5 ? 'add' : 'subtract';

      if (operator === 'add') {
        const first = randomInt(range.min, range.max - range.min);
        const second = randomInt(range.min, range.max - first);
        return { first, second, operator: '+', answer: first + second };
      }

      const first = randomInt(range.min * 2, range.max);
      const second = randomInt(range.min, first - range.min);
      return { first, second, operator: '-', answer: first - second };
    }

    function expressionTemplate(problem, layout) {
      if (layout === 'vertical') {
        return `
          <div class="expression">
            <span class="first">${problem.first}</span>
            <span class="op">${problem.operator}</span>
            <span class="second">${problem.second}</span>
          </div>`;
      }
      return `
        <div class="expression">
          <span>${problem.first}</span>
          <span>${problem.operator}</span>
          <span>${problem.second}</span>
          <span>=</span>
        </div>`;
    }

    function renderStarRating(correct, total) {
      const pct = total > 0 ? correct / total : 0;
      let stars = '';
      for (let i = 0; i < 5; i++) {
        stars += `<span class="star ${i < Math.round(pct * 5) ? 'lit' : ''}">⭐</span>`;
      }
      return stars;
    }

    function renderProblems() {
      problemsEl.className = `problems ${currentLayout}`;

      if (problems.length === 0) {
        problemsEl.innerHTML = `<div class="empty-state"><span class="emoji-big">📚</span>Bấm ✨ Tạo đề mới để bắt đầu luyện tập!</div>`;
        return;
      }

      problemsEl.innerHTML = problems.map((problem, index) => `
        <article class="problem" data-index="${index}">
          ${expressionTemplate(problem, currentLayout)}
          <input class="answer" type="number" inputmode="numeric" aria-label="Đáp án câu ${index + 1}">
          <span class="result" aria-hidden="true"></span>
        </article>
      `).join('');
    }

    function generateProblems() {
      const digits = digitsEl.value;
      const operationMode = operationEl.value;
      const count = Math.min(60, Math.max(1, Number(countEl.value) || 1));
      countEl.value = count;
      currentLayout = getSelectedLayout();

      problems = Array.from({ length: count }, () => createProblem(digits, operationMode));
      scoreBox.innerHTML = `🌟 Đã tạo <strong>${count}</strong> câu.`;
      renderProblems();

      const firstAnswer = problemsEl.querySelector('.answer');
      if (firstAnswer) firstAnswer.focus();
    }

    function gradeProblems() {
      if (problems.length === 0) {
        scoreBox.textContent = '😅 Hãy bấm ✨ Tạo đề mới trước khi chấm điểm nhé!';
        return;
      }

      let correct = 0;
      const cards = problemsEl.querySelectorAll('.problem');

      cards.forEach((card) => {
        const index = Number(card.dataset.index);
        const input = card.querySelector('.answer');
        const result = card.querySelector('.result');
        const value = Number(input.value);
        const hasAnswer = input.value.trim() !== '';
        const isCorrect = hasAnswer && value === problems[index].answer;

        card.classList.toggle('correct', isCorrect);
        card.classList.toggle('wrong', !isCorrect);
        result.textContent = isCorrect ? '✅' : '❌';

        if (isCorrect) correct += 1;
      });

      const pct = correct / problems.length;
      const msg = pct === 1 ? '🎉🎉🎉 Xuất sắc! Làm bài quá giỏi!' :
                  pct >= 0.8 ? '🎉 Làm tốt lắm! Cố gắng thêm nhé!' :
                  pct >= 0.5 ? '💪 Cố gắng hơn nữa nào!' :
                  '😊 Bé cần luyện thêm. Cố lên!';

      scoreBox.innerHTML = `
        <div>${msg}</div>
        <div style="margin-top:4px;"><strong>${correct}/${problems.length}</strong> câu đúng</div>
        <div class="stars">${renderStarRating(correct, problems.length)}</div>
      `;
    }

    generateBtn.addEventListener('click', generateProblems);
    gradeBtn.addEventListener('click', gradeProblems);
  </script>
</body>
</html>
